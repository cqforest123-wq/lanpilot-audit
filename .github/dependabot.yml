version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      frontend-development:
        dependency-type: development
  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
    ignore:
      - dependency-name: sha2
        versions: ["0.11.x"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
