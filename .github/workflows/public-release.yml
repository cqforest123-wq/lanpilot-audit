name: Public Notarized Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag to notarize and promote
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: public-notarized-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - name: Checkout tagged app
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.tag }}
      - name: Import Developer ID certificate
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          test -n "${CERTIFICATE_P12_BASE64}"
          test -n "${CERTIFICATE_PASSWORD}"
          test -n "${KEYCHAIN_PASSWORD}"
          echo "${CERTIFICATE_P12_BASE64}" | base64 --decode > certificate.p12
          security create-keychain -p "${KEYCHAIN_PASSWORD}" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" build.keychain
          security import certificate.p12 -k build.keychain -P "${CERTIFICATE_PASSWORD}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "${KEYCHAIN_PASSWORD}" build.keychain
          rm certificate.p12
      - name: Install frontend dependencies
        run: npm ci
      - name: Build, sign, and notarize
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_PATH: ${{ secrets.ASC_KEY_PATH }}
        run: |
          [[ "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          test "${RELEASE_TAG}" = "v$(node -p "require('./package.json').version")"
          npm run release:public
          npm run checksums
          npm run release:artifacts:verify
          npm run release:smoke
          npm run release:prepare
      - name: Promote GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          gh release upload "${RELEASE_TAG}" release-assets/* --clobber
          gh release edit "${RELEASE_TAG}" \
            --title "LANPilot Audit ${RELEASE_TAG#v}" \
            --prerelease=false
