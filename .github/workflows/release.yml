name: Local Release Smoke

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Optional branch or tag to build for a local release smoke check
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: local-release-smoke-${{ github.ref }}
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - name: Checkout app
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: lanpilot-audit-app
          ref: ${{ inputs.ref || github.ref }}
      - name: Install frontend dependencies
        working-directory: lanpilot-audit-app
        run: npm ci
      - name: Audit production dependencies
        working-directory: lanpilot-audit-app
        run: npm audit --omit=dev --audit-level=high
      - name: Build and verify local release
        working-directory: lanpilot-audit-app
        run: npm run release:local
      - name: Generate release website
        working-directory: lanpilot-audit-app
        run: npm run release:website
      - name: Verify final release artifacts
        working-directory: lanpilot-audit-app
        run: npm run release:artifacts:verify
      - name: Smoke test release app
        working-directory: lanpilot-audit-app
        run: npm run release:smoke
      - name: Prepare portable release assets
        working-directory: lanpilot-audit-app
        run: npm run release:prepare
      - name: Upload CI release artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: LANPilot-Audit-local-release-smoke
          path: lanpilot-audit-app/release-assets/*
          if-no-files-found: error
