name: App Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: app-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - name: Checkout app
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install frontend dependencies
        run: npm ci
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
      - name: Build and verify local release
        run: npm run release:local
      - name: Generate release website
        run: npm run release:website
      - name: Verify final release artifacts
        run: npm run release:artifacts:verify
      - name: Smoke test release app
        run: npm run release:smoke
      - name: Prepare portable release assets
        run: npm run release:prepare
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "release-assets/LANPilot-Audit_${GITHUB_REF_NAME#v}_aarch64.dmg" \
            "release-assets/SHA256SUMS.txt" \
            --title "LANPilot Audit ${GITHUB_REF_NAME#v} Local Build" \
            --prerelease \
            --notes "Internal testing build. Signature: ad-hoc signed. Notarization: not notarized. Developer ID: pending. LANPilot Audit remains local-first and runs real observations only after explicit authorization."
      - name: Verify published release
        run: npm run release:verify
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Upload CI release artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: LANPilot-Audit-${{ github.ref_name }}
          path: release-assets/*
          if-no-files-found: error
