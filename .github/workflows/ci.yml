name: App CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: app-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - name: Checkout app
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: lanpilot-audit-app
      - name: Install frontend dependencies
        working-directory: lanpilot-audit-app
        run: npm ci
      - name: Audit production dependencies
        working-directory: lanpilot-audit-app
        run: npm audit --omit=dev --audit-level=high
      - name: Verify bundled engine sync
        working-directory: lanpilot-audit-app
        run: npm run engine:sync:check
      - name: Run full checks
        working-directory: lanpilot-audit-app
        run: npm run check
      - name: Verify visible localization
        working-directory: lanpilot-audit-app
        run: npm run i18n:visible-check
      - name: Verify deep security boundary
        working-directory: lanpilot-audit-app
        run: npm run security:deep-check
      - name: Verify public repository readiness
        working-directory: lanpilot-audit-app
        run: npm run public:check
